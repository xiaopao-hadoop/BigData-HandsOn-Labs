# ==============================================================================
# File: server.properties
# Description: Kafka 分布式集群 Broker 核心配置文件模板
# Usage:
#   1. 将 <BROKER_ID> 替换为当前节点的唯一整数 (例如：master 设为 0, worker 1 设为 1)。
#   2. 将 <CURRENT_NODE_HOSTNAME> 替换为当前节点的主机名 (用于内网集群高速通信)。
#   3. 将 <EXTERNAL_ACCESS_IP> 和 <EXTERNAL_PORT> 替换为外部机器(如宿主机)访问该节点的映射 IP 和端口。
#   4. 将 ZK 连接串中的 <MASTER_HOSTNAME> 等替换为真实的 ZK 集群节点主机名。
# ==============================================================================

# Broker 的全局唯一标识符，集群内绝对不能重复
broker.id=<BROKER_ID>

# ==================== 网络与监听器配置 (内外网隔离架构) ====================
# 监听绑定地址
listeners=INTERNAL://0.0.0.0:19092,EXTERNAL://0.0.0.0:9092
# 暴露给客户端的地址：内网走主机名通信，外网走真实映射 IP
advertised.listeners=INTERNAL://<CURRENT_NODE_HOSTNAME>:19092,EXTERNAL://<EXTERNAL_ACCESS_IP>:<EXTERNAL_PORT>
# 协议映射器
listener.security.protocol.map=INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
# 明确集群内部数据同步使用 INTERNAL 网络
inter.broker.listener.name=INTERNAL

# 网络处理与 IO 线程池 (根据系统资源适当调整)
num.network.threads=3
num.io.threads=8
socket.send.buffer.bytes=102400
socket.receive.buffer.bytes=102400
socket.request.max.bytes=104857600

# ==================== 存储与分区配置 ====================
# Kafka 消息数据的持久化落地目录
log.dirs=/opt/data/kafka

# 创建 Topic 时的默认分区数 (建议与集群节点数保持一致)
num.partitions=3
num.recovery.threads.per.data.dir=1

# ==================== 内部 Topic 与容错机制 ====================
# 消费者偏移量和事务日志的副本策略 (设置为 2，允许挂掉一台节点不影响可用性)
offsets.topic.replication.factor=2
transaction.state.log.replication.factor=2
transaction.state.log.min.isr=2

# 日志生命周期 (默认保留 168 小时，即 7 天)
log.retention.hours=168
log.retention.check.interval.ms=300000

# ==================== Zookeeper 协调器连接 ====================
# 关联外部独立的 Zookeeper 集群
zookeeper.connect=<MASTER_HOSTNAME>:2181,<WORKER1_HOSTNAME>:2181,<WORKER2_HOSTNAME>:2181
zookeeper.connection.timeout.ms=18000

# ==================== 集群高级与运维配置 ====================
# 延迟初始消费者再平衡，避免频繁 Rebalance
group.initial.rebalance.delay.ms=0
# 允许使用命令行或 API 彻底删除 Topic 与对应数据文件 (强烈建议开启)
delete.topic.enable=true