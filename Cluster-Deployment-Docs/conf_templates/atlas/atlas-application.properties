# ==============================================================================
# File: atlas-application.properties
# Description: Apache Atlas 核心配置文件模板
# Usage:
#   1. 将 <MASTER_HOSTNAME>、<WORKER1_HOSTNAME>、<WORKER2_HOSTNAME> 替换为真实主机名。
#   2. 确保 Solr 中已经提前手动创建了 vertex_index、edge_index、fulltext_index 这三个 Collection。
# ==============================================================================

# ==================== 1. 图数据库存储后端 (HBase) ====================
atlas.graph.storage.backend=hbase2
atlas.graph.storage.hbase.table=apache_atlas_janus
atlas.graph.storage.hostname=<MASTER_HOSTNAME>:2181,<WORKER1_HOSTNAME>:2181,<WORKER2_HOSTNAME>:2181
atlas.graph.storage.hbase.regions-per-server=1

# 审计日志也使用 HBase 存储
atlas.EntityAuditRepository.impl=org.apache.atlas.repository.audit.HBaseBasedAuditRepository
atlas.audit.hbase.tablename=apache_atlas_entity_audit
atlas.audit.zookeeper.session.timeout.ms=1000
atlas.audit.hbase.zookeeper.quorum=<MASTER_HOSTNAME>:2181

# ==================== 2. 全文索引后端 (Solr Cloud) ====================
atlas.graph.index.search.backend=solr
atlas.graph.index.search.solr.mode=cloud
# 注意这里的 /solr 后缀，必须与启动 Solr 时指定的 ZNode 命名空间一致
atlas.graph.index.search.solr.zookeeper-url=<MASTER_HOSTNAME>:2181,<WORKER1_HOSTNAME>:2181,<WORKER2_HOSTNAME>:2181/solr
atlas.graph.index.search.solr.zookeeper-connect-timeout=60000
atlas.graph.index.search.solr.zookeeper-session-timeout=60000
atlas.graph.index.search.solr.wait-searcher=false
atlas.graph.index.search.max-result-set-size=150

# ==================== 3. 实时血缘消息总线 (Kafka) ====================
atlas.notification.embedded=false
atlas.kafka.zookeeper.connect=<MASTER_HOSTNAME>:2181,<WORKER1_HOSTNAME>:2181,<WORKER2_HOSTNAME>:2181
atlas.kafka.bootstrap.servers=<MASTER_HOSTNAME>:9092,<WORKER1_HOSTNAME>:9092,<WORKER2_HOSTNAME>:9092

atlas.kafka.zookeeper.session.timeout.ms=400
atlas.kafka.zookeeper.connection.timeout.ms=200
atlas.kafka.zookeeper.sync.time.ms=20
atlas.kafka.auto.commit.interval.ms=1000
atlas.kafka.hook.group.id=atlas
atlas.kafka.enable.auto.commit=false
atlas.kafka.auto.offset.reset=earliest
atlas.kafka.session.timeout.ms=30000
atlas.kafka.offsets.topic.replication.factor=1
atlas.kafka.poll.timeout.ms=1000

atlas.notification.create.topics=true
atlas.notification.replicas=1
atlas.notification.topics=ATLAS_HOOK,ATLAS_ENTITIES
atlas.notification.log.failed.messages=true
atlas.notification.consumer.retry.interval=500
atlas.notification.hook.retry.interval=1000

# ==================== 4. 身份验证与安全 ====================
atlas.authentication.method.kerberos=false
atlas.authentication.method.file=true
atlas.authentication.method.file.filename=users-credentials.properties
atlas.authentication.method.ldap.type=none
atlas.enableTLS=false
atlas.rest-csrf.enabled=true
atlas.rest-csrf.browser-useragents-regex=^Mozilla.*,^Opera.*,^Chrome.*
atlas.rest-csrf.methods-to-ignore=GET,OPTIONS,HEAD,TRACE
atlas.rest-csrf.custom-header=X-XSRF-HEADER

# ==================== 5. Server 与 UI ====================
atlas.rest.address=http://<MASTER_HOSTNAME>:21000
atlas.ui.default.version=v1
atlas.authorizer.impl=simple
atlas.authorizer.simple.authz.policy.file=atlas-simple-authz-policy.json
