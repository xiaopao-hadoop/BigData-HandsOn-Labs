# ==============================================================================
# File: zoo.cfg
# Description: Zookeeper 集群核心配置文件模板
# Usage:
#   1. 将下方的 <MASTER_HOSTNAME>、<WORKER1_HOSTNAME>、<WORKER2_HOSTNAME> 
#      替换为你真实的集群节点主机名。
#   2. 确保配置中的 dataDir 路径已在各机器上创建，且该目录下包含正确的 myid 文件。
#   3. 如果更改了全局目录规范，请同步修改 dataDir 和 dataLogDir。
# ==============================================================================

# ZK 心跳基本时间单位 (毫秒)
tickTime=2000

# Leader 与 Follower 初始连接能容忍的最多心跳数 (10 * 2000ms = 20s)
initLimit=10

# Leader 与 Follower 之间同步消息及应答能容忍的最多心跳数
syncLimit=5

# Zookeeper 内存快照数据存储目录 (必须与各节点的 myid 文件所在目录一致)
dataDir=/opt/data/zookeeper

# Zookeeper 事务日志目录 (建议与 dataDir 分离以提升写性能)
dataLogDir=/opt/logs/zookeeper

# 客户端与 ZK 交互的端口
clientPort=2181

# 最大客户端并发连接数 (默认60，若微服务或组件较多可取消注释并调大)
#maxClientCnxns=60

# 自动清理快照与事务日志 (生产环境建议开启以防止磁盘打满)
#autopurge.snapRetainCount=3
#autopurge.purgeInterval=1

# ==================== 集群节点配置 ====================
# 格式: server.A=B:C:D (A是myid, B是主机名, C是节点间通信端口, D是选举Leader端口)
server.1=<MASTER_HOSTNAME>:2888:3888
server.2=<WORKER1_HOSTNAME>:2888:3888
server.3=<WORKER2_HOSTNAME>:2888:3888

# ==================== 安全与监控配置 ====================
# 开启四字命令白名单，必须开启，否则后续的 Solr Cloud 和 Atlas 将无法获取 ZK 状态
4lw.commands.whitelist=mntr,conf,ruok